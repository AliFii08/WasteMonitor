<body>

  <div class="title">
    <h1>Gestión de Rutas</h1>
    <span>Cree, edite o asigne rutas.</span>
  </div>
  
<div class="map-container card">
  <div class="header-map">    
    <select class="route-selector" (change)="onRouteSelect($event)">
      <option value="">-- Selecciona una ruta --</option>
      <option *ngFor="let route of availableRoutes" [value]="route.id">
        {{ route.id }}
      </option>
    </select>
  </div>

  <div id="map"></div>

  <div class="footer-info">
    <div class="status-badge success">
      <i class="pi pi-info-circle"></i> {{ selectedRouteId ? 'Editando: ' + selectedRouteId : 'Seleccione una ruta' }}
    </div>
    <button (click)="resetView()" class="btn-center">
      <i class="pi pi-search-plus"></i> Reajustar Vista
    </button>
  </div>
</div>
  
</body>
